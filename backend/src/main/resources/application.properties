# ==================== SERVER CONFIGURATION ====================
# Порт, на котором будет запущен сервер
#server.address=0.0.0.0
server.port=8080
#server.ssl.enabled=true
#server.ssl.key-store=/home/adam/Code/A-2/backend/src/main/resources/keystore.p12
#server.ssl.key-store-password=changeit
#server.ssl.key-store-type=PKCS12
#server.ssl.key-alias=backend

# ==================== DATABASE CONFIGURATION ====================
# URL подключения к PostgreSQL
# Формат: jdbc:postgresql://ХОСТ:ПОРТ/ИМЯ_БАЗЫ
spring.datasource.url=jdbc:postgresql://localhost:5432/estimate_db

# Имя пользователя PostgreSQL (по умолчанию postgres)
spring.datasource.username=postgres

# Пароль пользователя PostgreSQL
spring.datasource.password=postgres

# Драйвер для PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA/HIBERNATE CONFIGURATION ====================
# Диалект PostgreSQL (как Hibernate будет общаться с БД)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Автоматически создавать/обновлять таблицы при запуске
# validate: только проверяет схему
# update: обновляет схему (создаёт таблицы, колонки)
# create: создаёт схему заново (удаляет данные)
# create-drop: создаёт схему и удаляет при остановке
spring.jpa.hibernate.ddl-auto=update

# Показывать SQL запросы в консоли (для отладки)
spring.jpa.show-sql=true

# Форматировать SQL для читаемости
spring.jpa.properties.hibernate.format_sql=true

# ==================== WEBSOCKET CONFIGURATION ====================
# Максимальный размер сообщения WebSocket (10 МБ)
spring.websocket.max-text-message-size=10485760

# ==================== LOGGING ====================
# Уровень логирования для нашего приложения
logging.level.com.example.estimateserver=DEBUG

# Уровень логирования Spring
logging.level.org.springframework=INFO

# Логировать SQL параметры
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== CORS ====================
# Разрешённые источники (для продакшена укажите конкретные IP)
# spring.web.cors.allowed-origins=http://localhost:3000,http://192.168.1.100:8080
spring.web.cors.allowed-origins=*

# ==================== FILE UPLOADS (если нужно) ====================
# Максимальный размер загружаемого файла
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==================== JACKSON (JSON) ====================
# Формат дат
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Europe/Moscow
spring.jackson.serialization.write-dates-as-timestamps=false

# Игнорировать неизвестные поля в JSON
spring.jackson.deserialization.fail-on-unknown-properties=false

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

